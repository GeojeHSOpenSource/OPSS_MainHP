<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>오픈소스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <span class="header-label">해성고등학교 오픈소스 동아리</span>
  </header>

  <main class="container">

    <div class="block" data-index="0">
      <div class="block-accent"></div>
      <div class="block-content">
        <span class="block-tag">01</span>
        <h2 class="block-title">오픈소스란?</h2>
        <p class="block-desc">
          오픈소스는 프로그래밍 중심 동아리로,
프로그래밍 강의 후 팀활동과 보고서를 통해 자신의 작품을 만들어 발표하는 활동을 하는 동아리입니다
        </p>
      </div>
    </div>

    <div class="block" data-index="1">
      <div class="block-accent"></div>
      <div class="block-content">
        <span class="block-tag">02</span>
        <h2 class="block-title">면접관련</h2>
        <p class="block-desc">
          면접은 프로그래밍을 <b>잘</b> 하는사람보단 
          <b>열심히</b> 하는 사람을 주로 뽑습니다.
          만약 오픈소스에 뽑히고싶다면 실력도 중요하지만 무엇보다 <b>열정이 있다는걸 보여주세요!</b>
        </p>
      </div>
    </div>

    
    <div class="block" data-index="3">
      <div class="block-accent"></div>
      <div class="block-content">
        <span class="block-tag">03</span>
        <h2 class="block-title">신청폼</h2>
        <p class="block-desc">
          링크를 눌러 오픈소스에 신청해주세요.
          <a href="https://forms.gle/HfGeLGMss3NLbSU17">구글 시드 신청 시드</a>
        </p>
      </div>
    </div>

  </main>

  <script src="main.js"></script>
</body>
</html>
